<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign-up Form</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="main-container">
    <div class="background-container">
      <div class="title-container">
        <img src="odin.png" alt="Odin logo" class="odin-logo">
        <p class="odin">ODIN</p>
      </div>
      <p class="image-description">Photo by <a href="#">Halie West</a> on <a href="#">Unsplash</a></p>
    </div>
    <div class="form-container">
      <div class="intro">
        <p>This is not a real online service! You know you need something like this in your
          life you realize your deepest
          dreams. Sign up now to get started.</p>
        <p>You <em>know</em> you want to.</p>
      </div>
      <form action="#" method="get">
        <fieldset class="inputs-container">
          <legend>
            Let's do this!
          </legend>
          <div class="form-row">
            <label for="first-name">FIRST NAME</label>
            <input type="text" id="first-name" name="first-name" required>
          </div>
          <div class="form-row">
            <label for="last-name">LAST NAME</label>
            <input type="text" id="last-name" name="last-name" required>
          </div>
          <div class="form-row">
            <label for="email">EMAIL</label>
            <input type="email" name="email" id="email" placeholder="johndoe@email.com" required>
          </div>
          <div class="form-row">
            <label for="phone-number">PHONE NUMBER</label>
            <input type="tel" name="phone-number" id="phone-number">
          </div>
          <div class="form-row">
            <label for="password">PASSWORD</label>
            <input type="password" name="password" id="password" required minlength="8" maxlength="16">
          </div>
          <div class="form-row">
            <label for="password-confirmation">CONFIRM PASSWORD</label>
            <input type="password" name="confirmed-password" id="password-confirmation" required minlength="8"
              maxlength="16">
          </div>
        </fieldset>
        <div class="account-creation">
          <button>Create Account</button>
          <p>Already have an account? <a href="#">Log in</a></p>
        </div>
      </form>
    </div>
  </div>
</body>

</html>
